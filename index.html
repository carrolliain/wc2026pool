    function createInitialFixtures() {
      const pairOrder = [[0, 1], [2, 3], [0, 2], [1, 3], [0, 3], [1, 2]];
      const fixtures = [];
      GROUP_NAMES.forEach(group => {
        const groupTeams = TEAMS.filter(team => team.group === group);
        pairOrder.forEach(([homeIndex, awayIndex], matchIndex) => {
          const schedule = GROUP_SCHEDULE[group][matchIndex];
          fixtures.push({
            id: `${group}-${matchIndex + 1}`,
            matchNo: schedule.matchNo,
            group,
            round: matchIndex + 1,
            home: groupTeams[homeIndex].name,
            away: groupTeams[awayIndex].name,
            date: schedule.date,
            time: schedule.time,
            venue: schedule.venue,
            homeScore: null,
            awayScore: null
          });
        });
      });
      return fixtures;
    }

    function shuffleTeams(teams) {
      const shuffled = [...teams];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const randomValue = window.crypto?.getRandomValues ? crypto.getRandomValues(new Uint32Array(1))[0] / 2 ** 32 : Math.random();
        const j = Math.floor(randomValue * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function generateDraft() {
      if (!isControlUnlocked()) {
        els.lockStatus.textContent = "Unlock the dashboard before randomizing.";
        return;
      }

      if (appState.players.length === 0) {
        els.copyStatus.textContent = "Add at least one participant before randomizing.";
        return;
      }

      appState.assignments = Object.fromEntries(appState.players.map(player => [player, []]));
      appState.leftovers = [];

      [1, 2, 3, 4].forEach(tier => {
        const tierTeams = shuffleTeams(TEAMS.filter(team => team.tier === tier));
        const quota = Math.floor(tierTeams.length / appState.players.length);

        if (quota >= 1) {
          appState.players.forEach(player => {
            const picks = tierTeams.splice(0, quota);
            appState.assignments[player].push(...picks);
          });
        }

        appState.leftovers.push(...tierTeams);
      });

      updateHashAndRender();
    }

    function compileStandings() {
      const ownerByTeam = getOwnerByTeam();
      const standings = {};

      GROUP_NAMES.forEach(group => {
        standings[group] = TEAMS
          .filter(team => team.group === group)
          .map(team => ({
            team: team.name,
            group,
            owner: ownerByTeam[team.name] || "",
            played: 0,
            points: 0,
            gf: 0,
            ga: 0,
            gd: 0
          }));
      });

      appState.fixtures.forEach(match => {
        if (!Number.isInteger(match.homeScore) || !Number.isInteger(match.awayScore)) return;

        const home = standings[match.group].find(row => row.team === match.home);
        const away = standings[match.group].find(row => row.team === match.away);
        if (!home || !away) return;

        home.played += 1;
        away.played += 1;
        home.gf += match.homeScore;
        home.ga += match.awayScore;
        away.gf += match.awayScore;
        away.ga += match.homeScore;

        if (match.homeScore > match.awayScore) home.points += 3;
        else if (match.homeScore < match.awayScore) away.points += 3;
        else {
          home.points += 1;
          away.points += 1;
        }

        home.gd = home.gf - home.ga;
        away.gd = away.gf - away.ga;
      });

      Object.values(standings).forEach(groupRows => {
        groupRows.sort((a, b) =>
          b.points - a.points ||
          b.gd - a.gd ||
          b.gf - a.gf ||
          a.team.localeCompare(b.team)
        );
      });

      return standings;
    }

    function getOwnerByTeam() {
      const ownerByTeam = {};
      Object.entries(appState.assignments).forEach(([player, teams]) => {
        teams.forEach(team => {
          ownerByTeam[team.name] = player;
        });
      });
      return ownerByTeam;
    }

    async function loadPoolState() {
      if (!currentPoolSlug) {
        appState = { players: [], assignments: {}, leftovers: [], fixtures: createInitialFixtures(), knockouts: {} };
        render();
        refreshLiveData();
        setInterval(refreshLiveData, 60000);
        els.copyStatus.textContent = "Enter a pool name to load shared pool data.";
        return;
      }

      try {
        const response = await fetch(poolApiUrl());
        if (!response.ok) throw new Error("Unable to load pool");
        const data = await response.json();
        if (data.state) applyParsedState(data.state);
        else hydrateFromHash();
      } catch (error) {
        console.warn("Using local default state because the pool server was not reachable.", error);
        hydrateFromHash();
      }
      render();
      refreshLiveData();
      setInterval(refreshLiveData, 60000);
    }

    async function refreshLiveData() {
      try {
        const response = await fetch("/api/worldcup/live");
        if (!response.ok) throw new Error("Live feed unavailable");
        const data = await response.json();
        if (!data.configured) {
          els.liveDataStatus.textContent = data.message;
          return;
        }

        const updates = applyLiveScores(data.liveScores || []);
        els.liveDataStatus.textContent = `Live feed connected. Last checked ${new Date(data.fetchedAt).toLocaleTimeString()}. ${updates} score update${updates === 1 ? "" : "s"} applied.`;
        if (updates > 0) {
          renderFixtures();
          renderStandings();
        }
      } catch (error) {
        els.liveDataStatus.textContent = "Live score feed is currently unavailable.";
      }
    }

    function applyLiveScores(liveScores) {
      let updates = 0;
      liveScores.forEach(item => {
        const home = normalizeTeamName(item.home?.name);
        const away = normalizeTeamName(item.away?.name);
        const score = parseScore(item.scores?.score || item.scores?.ft_score);
        if (!score) return;

        const groupMatch = appState.fixtures.find(match =>
          normalizeTeamName(match.home) === home && normalizeTeamName(match.away) === away
        );
        if (groupMatch && (groupMatch.homeScore !== score.homeScore || groupMatch.awayScore !== score.awayScore)) {
          groupMatch.homeScore = score.homeScore;
          groupMatch.awayScore = score.awayScore;
          updates += 1;
        }

        const knockoutMatch = buildKnockoutMatches().find(match =>
          normalizeTeamName(match.homeTeam) === home && normalizeTeamName(match.awayTeam) === away
        );
        if (knockoutMatch) {
          const current = appState.knockouts[knockoutMatch.matchNo] || { homeScore: null, awayScore: null };
          if (current.homeScore !== score.homeScore || current.awayScore !== score.awayScore) {
            appState.knockouts[knockoutMatch.matchNo] = score;
            updates += 1;
          }
        }
      });
      return updates;
    }

    function parseScore(value) {
      const match = String(value || "").match(/(\d+)\s*-\s*(\d+)/);
      if (!match) return null;
      return { homeScore: Number(match[1]), awayScore: Number(match[2]) };
    }

    function normalizeTeamName(name) {
      return String(name || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
    }

    function normalizePoolSlug(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9-]/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "");
    }

    function applyParsedState(parsed) {
      const fixturesById = Object.fromEntries(createInitialFixtures().map(match => [match.id, match]));
      const restoredFixtures = Array.isArray(parsed.fixtures)
        ? createInitialFixtures().map(match => ({ ...match, ...(parsed.fixtures.find(saved => saved.id === match.id) || {}) }))
        : createInitialFixtures();

      appState = {
        players: Array.isArray(parsed.players) ? parsed.players.filter(Boolean).map(String) : [],
        assignments: restoreAssignments(parsed.assignments),
        leftovers: restoreTeamArray(parsed.leftovers),
        fixtures: restoredFixtures.filter(match => fixturesById[match.id]),
        knockouts: restoreKnockouts(parsed.knockouts)
      };
    }

    function hydrateFromHash() {
      const hash = window.location.hash.replace(/^#/, "");
      if (!hash.startsWith("pool=")) return;

      try {
        const decoded = decodeURIComponent(escape(atob(hash.slice(5))));
        const parsed = JSON.parse(decoded);
        applyParsedState(parsed);
      } catch (error) {
        console.warn("Unable to parse shared pool state.", error);
        appState = { players: [], assignments: {}, leftovers: [], fixtures: createInitialFixtures(), knockouts: {} };
      }
    }

    function restoreKnockouts(knockouts) {
      if (!knockouts || typeof knockouts !== "object") return {};
      return Object.fromEntries(Object.entries(knockouts).map(([matchNo, score]) => [
        matchNo,
        {
          homeScore: Number.isInteger(score?.homeScore) ? score.homeScore : null,
          awayScore: Number.isInteger(score?.awayScore) ? score.awayScore : null
        }
      ]));
    }

    function restoreAssignments(assignments) {
      const restored = {};
      if (!assignments || typeof assignments !== "object") return restored;

      Object.entries(assignments).forEach(([player, teams]) => {
        restored[player] = restoreTeamArray(teams);
      });

      return restored;
    }

    function restoreTeamArray(teams) {
      if (!Array.isArray(teams)) return [];
      return teams
        .map(team => TEAM_BY_NAME[team?.name] || TEAM_BY_NAME[team])
        .filter(Boolean);
    }

    function createAssignmentBackup() {
      return {
        type: "worldcup-pool-assignment-backup",
        version: 1,
        pool: currentPoolSlug,
        exportedAt: new Date().toISOString(),
        players: [...appState.players],
        assignments: Object.fromEntries(appState.players.map(player => [
          player,
          (appState.assignments[player] || []).map(team => team.name)
        ]))
      };
    }

    function downloadAssignmentBackup() {
      const backup = createAssignmentBackup();
      const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `${currentPoolSlug || "unsaved-pool"}-assignments-backup.json`;
      link.click();
      URL.revokeObjectURL(url);
      els.backupStatus.textContent = "Backup downloaded.";
    }

    function importAssignmentBackup(backup) {
      if (!isControlUnlocked()) {
        els.backupStatus.textContent = "Unlock the dashboard before importing.";
        return;
      }

      if (!backup || !Array.isArray(backup.players) || !backup.assignments || typeof backup.assignments !== "object") {
        els.backupStatus.textContent = "Invalid backup file.";
        return;
      }

      const assignedNames = new Set();
      const players = backup.players.map(player => String(player).trim()).filter(Boolean);
      const assignments = {};

      players.forEach(player => {
        const teams = restoreTeamArray(backup.assignments[player]);
        assignments[player] = teams.filter(team => {
          if (assignedNames.has(team.name)) return false;
          assignedNames.add(team.name);
          return true;
        });
      });

      appState.players = players;
      appState.assignments = assignments;
      appState.leftovers = TEAMS.filter(team => !assignedNames.has(team.name));
      updateHashAndRender();
      els.backupStatus.textContent = `Imported ${players.length} player${players.length === 1 ? "" : "s"} and ${assignedNames.size} assigned team${assignedNames.size === 1 ? "" : "s"}.`;
    }

    function updateHashAndRender() {
      updateHash();
      render();
    }

    function updateHash() {
      saveStateToServer();

    async function saveStateToServer() {
      const token = sessionStorage.getItem("worldCupAdminToken");
      if (!token || !currentPoolSlug) return;

      try {
        const response = await fetch(poolApiUrl(), {
          method: "PUT",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ state: appState })
        });
        if (!response.ok) throw new Error("Save failed");
        els.copyStatus.textContent = `Saved pool "${currentPoolSlug}".`;
      } catch (error) {
        console.warn(error);
        setControlUnlocked(false);
        els.lockStatus.textContent = "Save failed. Unlock again before editing.";
      }
    }

      mobileTabs.forEach(button => {
        const active = button.dataset.section === activeMobileSection;
        button.className = `mobile-tab rounded-lg px-2 py-2 text-xs font-black uppercase tracking-wide transition ${active ? "bg-[#fcd116] text-[#07122d]" : "bg-[#10265f] text-slate-300"}`;
      });
    }

    function isControlUnlocked() {
      return Boolean(sessionStorage.getItem("worldCupAdminToken"));
    }

    function setControlUnlocked(unlocked) {
      if (unlocked) {
        if (!sessionStorage.getItem("worldCupAdminToken")) return;
      } else {
        sessionStorage.removeItem("worldCupAdminToken");
      }
      renderLockState();
    }

    function renderLockState() {
      const unlocked = isControlUnlocked();
      els.lockBadge.textContent = unlocked ? "Unlocked" : "Locked";
      els.lockBadge.className = `rounded-md px-2 py-1 text-xs font-black uppercase tracking-wide ${unlocked ? "bg-[#009b3a] text-white" : "bg-[#c8102e] text-white"}`;
      els.lockToggleBtn.textContent = unlocked ? "Lock" : "Unlock";
      els.lockPassword.disabled = unlocked;
      els.lockPassword.classList.toggle("opacity-50", unlocked);
      els.playerName.disabled = !unlocked;
      els.playerName.classList.toggle("opacity-50", !unlocked);
      els.draftBtn.disabled = !unlocked;
      els.draftBtn.classList.toggle("opacity-50", !unlocked);
      els.draftBtn.classList.toggle("cursor-not-allowed", !unlocked);
    }

    function renderPlayers() {
      const unlocked = isControlUnlocked();
      els.playersList.innerHTML = appState.players.length
        ? appState.players.map(player => `
          <li class="flex items-center justify-between gap-3 rounded-md border border-slate-800 bg-slate-950 px-3 py-2">
            <span class="min-w-0 truncate text-sm font-semibold text-slate-100">${escapeHtml(player)}</span>
            <button class="remove-player rounded-md border border-slate-700 px-2 py-1 text-xs font-bold text-slate-300 transition hover:border-rose-400 hover:text-rose-300 disabled:cursor-not-allowed disabled:opacity-40" data-player="${escapeAttr(player)}" type="button" ${unlocked ? "" : "disabled"}>Remove</button>
          </li>
        `).join("")
        : `<li class="rounded-md border border-dashed border-slate-700 px-3 py-3 text-sm text-slate-400">No participants yet.</li>`;
    }

    function renderAssignments() {
      const assignedCount = Object.values(appState.assignments).reduce((total, teams) => total + teams.length, 0);
      els.draftCount.textContent = `${assignedCount} drafted`;

      els.assignmentsView.innerHTML = appState.players.length
        ? appState.players.map(player => {
          const teams = appState.assignments[player] || [];
          return `
            <article class="rounded-lg border border-slate-800 bg-slate-950 p-3">
              <div class="flex items-center justify-between gap-2">
                <h3 class="min-w-0 truncate text-sm font-bold text-white">${escapeHtml(player)}</h3>
                <span class="rounded-md bg-slate-800 px-2 py-1 text-xs font-semibold text-slate-300">${teams.length}</span>
              </div>
              <div class="mt-3 space-y-2">
                ${[1, 2, 3, 4].map(tier => renderTierGroup(teams, tier)).join("")}
              </div>
            </article>
          `;
        }).join("")
        : `<p class="rounded-md border border-dashed border-slate-700 px-3 py-3 text-sm text-slate-400">Add players, then run the draft.</p>`;

      els.leftoversView.innerHTML = appState.leftovers.length
        ? appState.leftovers.map(team => teamPill(team)).join("")
        : `<span class="text-sm text-slate-400">No leftover teams.</span>`;
    }

    function renderTierGroup(teams, tier) {
      const tierTeams = teams.filter(team => team.tier === tier);
      return `
        <div>
          <p class="text-xs font-bold uppercase tracking-wide text-slate-500">Tier ${tier}</p>
          <div class="mt-1 flex flex-wrap gap-1.5">${tierTeams.length ? tierTeams.map(team => teamPill(team)).join("") : `<span class="text-xs text-slate-500">None</span>`}</div>
        </div>
      `;
    }

    function teamPill(team) {
      return `<span class="rounded-md border border-white/10 bg-[#07122d] px-2 py-1 text-xs font-semibold text-slate-200">${teamLabel(team.name)} <span class="text-slate-500">T${team.tier}</span></span>`;
    }

    function renderTodayMatches() {
      const today = getLocalDateKey(new Date());
      const sortedFixtures = getChronologicalFixtures();
      const todayMatches = sortedFixtures.filter(match => match.date === today);
      const nextMatch = sortedFixtures.find(match => match.date > today);
      const heading = todayMatches.length ? `${todayMatches.length} match${todayMatches.length === 1 ? "" : "es"} today` : "No matches today";
      const detail = todayMatches.length
        ? todayMatches.map(match => compactMatchLine(match)).join("")
        : nextMatch
          ? `<p class="mt-2 text-sm text-slate-300">Next group-stage match: <span class="font-bold text-white">${formatMatchDate(nextMatch.date)}</span> at ${formatMatchTime(nextMatch)}, ${escapeHtml(nextMatch.venue)}.</p>`
          : `<p class="mt-2 text-sm text-slate-300">The group stage is complete.</p>`;

      els.todayMatchesView.innerHTML = `
        <section class="rounded-lg border border-[#fcd116]/40 bg-[#07122d] p-3">
          <div class="flex items-center justify-between gap-3">
            <h3 class="text-sm font-black uppercase tracking-wide text-[#fcd116]">Today's Matches</h3>
            <span class="rounded-md bg-[#c8102e] px-2 py-1 text-xs font-bold text-white">${escapeHtml(formatMatchDate(today))}</span>
          </div>
          <p class="mt-2 text-lg font-black text-white">${heading}</p>
          <div class="mt-2 space-y-2">${detail}</div>
        </section>
      `;
    }

    function renderFixtures() {
      els.fixtureCount.textContent = `${appState.fixtures.length} matches`;
      els.fixturesView.innerHTML = getChronologicalFixtures().map(match => `
        <article class="rounded-lg border border-white/10 bg-[#07122d] p-3">
          <div class="flex items-center justify-between gap-2">
            <span class="rounded-md bg-[#009b3a] px-2 py-1 text-xs font-bold text-white">Group ${match.group}</span>
            <span class="text-xs font-semibold text-[#fcd116]">Match ${match.matchNo}</span>
          </div>
          <div class="mt-2 grid grid-cols-1 gap-1 text-xs font-semibold text-slate-400">
            <span>${formatMatchDate(match.date)} - ${formatMatchTime(match)}</span>
            <span>${escapeHtml(match.venue)}</span>
          </div>
          <div class="mt-3 grid grid-cols-[minmax(0,1fr)_64px] items-center gap-2">
            <span class="truncate text-sm font-semibold text-slate-100">${teamLabel(match.home, { showOwner: true })}</span>
            <span class="grid h-10 place-items-center rounded-md border border-white/15 bg-[#10265f] px-2 text-center text-sm font-black text-white">${match.homeScore ?? "-"}</span>
            <span class="truncate text-sm font-semibold text-slate-100">${teamLabel(match.away, { showOwner: true })}</span>
            <span class="grid h-10 place-items-center rounded-md border border-white/15 bg-[#10265f] px-2 text-center text-sm font-black text-white">${match.awayScore ?? "-"}</span>
          </div>
        </article>
      `).join("");
    }

    function renderStandings() {
      renderStageTabs();
      if (activeStage === "groups") {
        renderGroupStage();
      } else {
        renderKnockoutStage(activeStage);
      }
    }

    function renderStageTabs() {
      els.stageTabs.innerHTML = STAGES.map(stage => `
        <button class="stage-tab rounded-md border px-3 py-2 text-xs font-black uppercase tracking-wide transition ${activeStage === stage.id ? "border-[#fcd116] bg-[#fcd116] text-[#07122d]" : "border-white/10 bg-[#07122d] text-slate-300 hover:border-[#fcd116] hover:text-white"}" data-stage="${stage.id}" type="button">
          ${escapeHtml(stage.label)}
        </button>
      `).join("");
    }

    function renderGroupStage() {
      const standings = compileStandings();
      els.standingsView.className = "mt-4 grid grid-cols-1 gap-3 xl:grid-cols-2";
      els.standingsView.innerHTML = GROUP_NAMES.map(group => `
        <article class="overflow-hidden rounded-lg border border-slate-800 bg-slate-950">
          <div class="flex items-center justify-between bg-slate-800 px-3 py-2">
            <h3 class="text-sm font-extrabold text-white">Group ${group}</h3>
            <span class="text-xs font-semibold text-slate-400">4 teams</span>
          </div>
          <div>
            <table class="w-full table-fixed text-left text-xs">
              <thead class="text-slate-500">
                <tr class="border-b border-slate-800">
                  <th class="w-8 px-2 py-2 font-bold">#</th>
                  <th class="px-2 py-2 font-bold">Team</th>
                  <th class="w-10 px-2 py-2 text-center font-bold">P</th>
                  <th class="w-12 px-2 py-2 text-center font-bold">Pts</th>
                  <th class="w-12 px-2 py-2 text-center font-bold">GD</th>
                  <th class="w-24 px-2 py-2 font-bold">Owner</th>
                </tr>
              </thead>
              <tbody>
                ${standings[group].map((row, index) => `
                  <tr class="border-b border-slate-900 last:border-b-0">
                    <td class="px-2 py-2 font-bold text-slate-500">${index + 1}</td>
                    <td class="truncate px-2 py-2 font-bold ${row.owner ? "text-emerald-300" : "text-slate-100"}">${teamLabel(row.team)}</td>
                    <td class="px-2 py-2 text-center text-slate-300">${row.played}</td>
                    <td class="px-2 py-2 text-center font-bold text-white">${row.points}</td>
                    <td class="px-2 py-2 text-center text-slate-300">${row.gd}</td>
                    <td class="max-w-24 truncate px-2 py-2 ${row.owner ? "font-bold text-emerald-300" : "text-slate-600"}">${escapeHtml(row.owner || "Unowned")}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </article>
      `).join("");
    }

    function renderKnockoutStage(stageId) {
      const matches = buildKnockoutMatches().filter(match => match.stage === stageId);
      const champion = buildKnockoutMatches().find(match => match.matchNo === 104);
      els.standingsView.className = stageId === "final"
        ? "mt-4 grid grid-cols-1 gap-3"
        : "mt-4 grid grid-cols-1 gap-3 xl:grid-cols-2";

      const championCard = stageId === "final" && champion?.winner
        ? `<section class="rounded-lg border border-[#fcd116] bg-[#07122d] p-4">
            <p class="text-xs font-black uppercase tracking-wide text-[#fcd116]">Champion</p>
            <p class="mt-2 text-2xl font-black text-white">${teamLabel(champion.winner)}</p>
          </section>`
        : "";

      els.standingsView.innerHTML = championCard + matches.map(match => knockoutCard(match)).join("");
    }

    function knockoutCard(match) {
      const score = appState.knockouts[match.matchNo] || { homeScore: null, awayScore: null };
      const isComplete = Number.isInteger(score.homeScore) && Number.isInteger(score.awayScore) && score.homeScore !== score.awayScore;
      return `
        <article class="rounded-lg border ${isComplete ? "border-[#fcd116]/60" : "border-white/10"} bg-[#07122d] p-3">
          <div class="flex items-center justify-between gap-2">
            <span class="rounded-md bg-[#c8102e] px-2 py-1 text-xs font-bold text-white">Match ${match.matchNo}</span>
            <span class="text-xs font-semibold text-[#fcd116]">${escapeHtml(match.title)}</span>
          </div>
          <div class="mt-2 grid gap-1 text-xs font-semibold text-slate-400">
            <span>${formatMatchDate(match.date)} - ${formatMatchTime(match)}</span>
            <span>${escapeHtml(match.venue)}</span>
          </div>
          <div class="mt-3 grid grid-cols-[minmax(0,1fr)_64px] items-center gap-2">
            <span class="truncate text-sm font-bold ${match.winner === match.homeTeam ? "text-emerald-300" : "text-white"}">${teamLabel(match.homeTeam || match.homeLabel, { showOwner: true })}</span>
            <span class="grid h-10 place-items-center rounded-md border border-white/15 bg-[#10265f] px-2 text-center text-sm font-black text-white">${score.homeScore ?? "-"}</span>
            <span class="truncate text-sm font-bold ${match.winner === match.awayTeam ? "text-emerald-300" : "text-white"}">${teamLabel(match.awayTeam || match.awayLabel, { showOwner: true })}</span>
            <span class="grid h-10 place-items-center rounded-md border border-white/15 bg-[#10265f] px-2 text-center text-sm font-black text-white">${score.awayScore ?? "-"}</span>
          </div>
          <p class="mt-3 min-h-5 text-xs font-semibold ${score.homeScore === score.awayScore && Number.isInteger(score.homeScore) ? "text-rose-300" : "text-slate-500"}">
            ${match.winner ? `Winner advances: ${teamLabel(match.winner)}` : "Waiting for official result."}
          </p>
        </article>
      `;
    }

    function buildKnockoutMatches() {
      const standings = compileStandings();
      const qualifiers = compileQualifiers(standings);
      const built = [];
      const byMatchNo = {};
      const usedThirds = new Set();

      KNOCKOUT_MATCHES.forEach(template => {
        const home = resolveKnockoutSlot(template.home, qualifiers, byMatchNo, usedThirds);
        const away = resolveKnockoutSlot(template.away, qualifiers, byMatchNo, usedThirds);
        const score = appState.knockouts[template.matchNo] || { homeScore: null, awayScore: null };
        const match = {
          ...template,
          homeTeam: home.team,
          awayTeam: away.team,
          homeLabel: home.label,
          awayLabel: away.label,
          winner: resolveWinner(home.team, away.team, score)
        };
        built.push(match);
        byMatchNo[template.matchNo] = match;
      });

      return built;
    }

    function compileQualifiers(standings) {
      const thirds = [];
      const byGroup = {};
      GROUP_NAMES.forEach(group => {
        byGroup[group] = standings[group];
        thirds.push(standings[group][2]);
      });
      thirds.sort((a, b) =>
        b.points - a.points ||
        b.gd - a.gd ||
        b.gf - a.gf ||
        a.team.localeCompare(b.team)
      );
      return { byGroup, thirds: thirds.slice(0, 8) };
    }

    function resolveKnockoutSlot(slot, qualifiers, byMatchNo, usedThirds) {
      if (slot.type === "rank") {
        const row = qualifiers.byGroup[slot.group]?.[slot.rank - 1];
        return { team: row?.team || "", label: `${slot.rank}${slot.group}` };
      }

      if (slot.type === "third") {
        const eligibleGroups = slot.groups.split("");
        const row = qualifiers.thirds.find(candidate =>
          eligibleGroups.includes(candidate.group) && !usedThirds.has(candidate.team)
        );
        if (row) {
          usedThirds.add(row.team);
          return { team: row.team, label: `3rd ${slot.groups.split("").join("/")}` };
        }
        return { team: "", label: `3rd ${slot.groups.split("").join("/")}` };
      }

      if (slot.type === "winner") {
        const previous = byMatchNo[slot.matchNo];
        return { team: previous?.winner || "", label: `Winner Match ${slot.matchNo}` };
      }

      return { team: "", label: "TBD" };
    }

    function resolveWinner(homeTeam, awayTeam, score) {
      if (!homeTeam || !awayTeam || !Number.isInteger(score.homeScore) || !Number.isInteger(score.awayScore)) return "";
      if (score.homeScore === score.awayScore) return "";
      return score.homeScore > score.awayScore ? homeTeam : awayTeam;
    }

    function getChronologicalFixtures() {
      return [...appState.fixtures].sort((a, b) =>
        a.date.localeCompare(b.date) ||
        a.time.localeCompare(b.time) ||
        a.matchNo - b.matchNo
      );
    }

    function compactMatchLine(match) {
      return `
        <div class="rounded-md border border-white/10 bg-[#10265f] p-2">
          <div class="text-sm font-bold text-white">${teamLabel(match.home, { showOwner: true })} <span class="text-slate-500">v</span> ${teamLabel(match.away, { showOwner: true })}</div>
          <div class="mt-1 text-xs font-semibold text-slate-400">${formatMatchTime(match)} - ${escapeHtml(match.venue)}</div>
        </div>
      `;
    }

    function teamLabel(teamName, options = {}) {
      const code = FLAG_CODES[teamName];
      const flag = code
        ? `<img class="inline-block h-4 w-6 rounded-[2px] object-cover align-[-3px] shadow-sm" src="https://flagcdn.com/w40/${code}.png" srcset="https://flagcdn.com/w80/${code}.png 2x" alt="${escapeAttr(teamName)} flag" loading="lazy" />`
        : `<span class="inline-grid h-4 w-6 place-items-center rounded-[2px] bg-slate-700 text-[8px] font-black text-slate-300 align-[-2px]">TBD</span>`;
      const owner = options.showOwner ? getTeamOwner(teamName) : "";
      const ownerBadge = owner
        ? ` <span class="ml-1 inline-block max-w-24 truncate rounded bg-[#fcd116]/15 px-1.5 py-0.5 align-middle text-[10px] font-black uppercase tracking-wide text-[#fcd116]">${escapeHtml(owner)}</span>`
        : "";
      return `${flag} <span>${escapeHtml(teamName)}</span>${ownerBadge}`;
    }

    function getTeamOwner(teamName) {
      return getOwnerByTeam()[teamName] || "";
    }

    function getVenueTimeZone(venue) {
      return VENUE_TIME_ZONES.find(item => venue.includes(item.match))?.zone || "America/New_York";
    }

    function getDisplayTimeZone(match) {
      if (selectedTimeZoneMode === "local") return getVenueTimeZone(match.venue);
      return DISPLAY_TIME_ZONES[selectedTimeZoneMode]?.zone || "Europe/Dublin";
    }

    function zonedTimeToUtc(dateKey, time, sourceZone) {
      const [year, month, day] = dateKey.split("-").map(Number);
      const [hour, minute] = time.split(":").map(Number);
      const guess = new Date(Date.UTC(year, month - 1, day, hour, minute));
      const sourceParts = getTimeParts(guess, sourceZone);
      const sourceAsUtc = Date.UTC(sourceParts.year, sourceParts.month - 1, sourceParts.day, sourceParts.hour, sourceParts.minute);
      return new Date(guess.getTime() - (sourceAsUtc - guess.getTime()));
    }

    function getTimeParts(date, timeZone) {
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).formatToParts(date);
      return Object.fromEntries(parts.filter(part => part.type !== "literal").map(part => [part.type, Number(part.value)]));
    }

    function formatMatchTime(match) {
      const targetZone = getDisplayTimeZone(match);
      const sourceZone = getVenueTimeZone(match.venue);
      const utcDate = zonedTimeToUtc(match.date, match.time, sourceZone);
      const label = selectedTimeZoneMode === "local" ? "local" : DISPLAY_TIME_ZONES[selectedTimeZoneMode].label;
      return `${utcDate.toLocaleTimeString(undefined, { timeZone: targetZone, hour: "2-digit", minute: "2-digit" })} ${label}`;
    }

    function getLocalDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatMatchDate(dateKey) {
      const date = new Date(`${dateKey}T12:00:00`);
      return date.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }

    els.playerForm.addEventListener("submit", event => {
      event.preventDefault();
      addPlayer(els.playerName.value);
      els.playerName.value = "";
      els.playerName.focus();
    });

    els.poolForm.addEventListener("submit", event => {
      event.preventDefault();
      const nextPool = normalizePoolSlug(els.poolNameInput.value);
      if (!nextPool) {
        els.copyStatus.textContent = "Enter a pool name before loading.";
        return;
      }
      currentPoolSlug = nextPool;
      history.replaceState(null, "", `${window.location.pathname}?pool=${encodeURIComponent(currentPoolSlug)}`);
      els.copyStatus.textContent = `Loaded pool "${currentPoolSlug}".`;
      loadPoolState();
    });

    els.backupBtn.addEventListener("click", downloadAssignmentBackup);

    els.importBackupInput.addEventListener("change", async event => {
      const file = event.target.files?.[0];
      if (!file) return;

      try {
        const backup = JSON.parse(await file.text());
        importAssignmentBackup(backup);
      } catch {
        els.backupStatus.textContent = "Could not read that backup file.";
      } finally {
        event.target.value = "";
      }
    });

    els.lockForm.addEventListener("submit", async event => {
      event.preventDefault();
      if (isControlUnlocked()) {
        setControlUnlocked(false);
        els.lockPassword.value = "";
        els.lockStatus.textContent = "Dashboard locked.";
        return;
      }

      try {
        const response = await fetch("/api/admin/unlock", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: els.lockPassword.value })
        });
        if (!response.ok) throw new Error("Incorrect password");
        const data = await response.json();
        sessionStorage.setItem("worldCupAdminToken", data.token);
        setControlUnlocked(true);
        els.lockPassword.value = "";
        els.lockStatus.textContent = "Admin editing unlocked for this browser session.";
        els.playerName.focus();
      } catch {
        els.lockStatus.textContent = "Incorrect password.";
        els.lockPassword.select();
      }
    });

    els.playersList.addEventListener("click", event => {
      const button = event.target.closest(".remove-player");
      if (button) removePlayer(button.dataset.player);
    });

    els.draftBtn.addEventListener("click", generateDraft);

    els.stageTabs.addEventListener("click", event => {
      const button = event.target.closest(".stage-tab");
      if (!button) return;
      activeStage = button.dataset.stage;
      renderStandings();
    });

    els.timeZoneSelect.addEventListener("change", event => {
      selectedTimeZoneMode = event.target.value;
      localStorage.setItem("worldCupTimeZoneMode", selectedTimeZoneMode);
      renderTodayMatches();
      renderFixtures();
      renderStandings();
    });

    mobileTabs.forEach(button => {
      button.addEventListener("click", () => {
        activeMobileSection = button.dataset.section;
        renderMobileSection();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });

    els.copyLinkBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(els.shareUrl.value);
        els.copyStatus.textContent = "Link copied to clipboard.";
      } catch {
        els.shareUrl.select();
        document.execCommand("copy");
        els.copyStatus.textContent = "Link selected and copied.";
      }
    });

    loadPoolState();
  </script>
</body>
</html>
